name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate crystal pool
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate JSONL schema and safety rules
        run: python scripts/validate_crystals.py crystals.jsonl

      - name: Run validator unit tests
        run: python -m unittest discover -s tests
